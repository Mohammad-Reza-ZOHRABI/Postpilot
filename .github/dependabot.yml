version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/pilot"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "npm"
    directory: "/pilot/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      svelte:
        patterns:
          - "svelte"
          - "@sveltejs/*"
      build-tools:
        patterns:
          - "vite"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
      dev-deps:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "ui"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
